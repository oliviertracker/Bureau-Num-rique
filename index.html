<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mon Bureau Virtuel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .drawer-open { transform: translateY(0%); transition: transform 0.4s ease-out; }
        .drawer-closed { transform: translateY(100%); transition: transform 0.3s ease-in; }
        body { transition: background-color 0.5s, color 0.5s; }
        .wood-texture { background-color: #f3f4f6; } /* Modifié dynamiquement par le JS */
        .dark-mode { background-color: #1a1a1a; color: #f9fafb; }
    </style>
</head>
<body class="wood-texture min-h-screen p-4 font-sans">

    <header class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold">Mon Bureau</h1>
        <div id="clock" class="text-lg font-mono">--:--</div>
    </header>

    <main class="grid grid-cols-2 gap-4" id="drawerGrid">
        </main>

    <div id="overlay" class="fixed inset-0 bg-black/50 hidden z-40"></div>
    <div id="drawerInterface" class="fixed bottom-0 left-0 right-0 h-[90vh] bg-white dark:bg-gray-800 rounded-t-3xl shadow-2xl z-50 drawer-closed p-6 hidden">
        <div class="flex justify-between items-center mb-6">
            <h2 id="drawerTitle" class="text-2xl font-bold">Tiroir</h2>
            <button onclick="closeDrawer()" class="text-3xl">&times;</button>
        </div>

        <div class="space-y-6">
            <div id="calendarSection" class="hidden">
                <input type="date" id="calDate" class="w-full p-3 border rounded dark:bg-gray-700 mb-4" onchange="loadDateData()">
                <p class="text-sm italic">Appuyez sur une date pour noter un RDV.</p>
            </div>

            <div class="relative">
                <label class="block mb-2 font-semibold">Notes / Compte-rendu :</label>
                <textarea id="noteArea" rows="4" class="w-full p-4 border rounded-xl dark:bg-gray-700 focus:ring-2 focus:ring-blue-500" placeholder="Écrivez ou dictez..."></textarea>
                <button onclick="startDictation()" class="absolute right-3 bottom-3 bg-blue-500 text-white p-3 rounded-full hover:bg-blue-600">
                    <i class="fas fa-microphone"></i>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <label class="flex flex-col items-center justify-center p-4 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700">
                    <i class="fas fa-camera text-2xl mb-2"></i>
                    <span class="text-xs">Photo</span>
                    <input type="file" accept="image/*" capture="environment" class="hidden" onchange="handleFileUpload(this)">
                </label>
                <label class="flex flex-col items-center justify-center p-4 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700">
                    <i class="fas fa-paperclip text-2xl mb-2"></i>
                    <span class="text-xs">Fichier</span>
                    <input type="file" class="hidden" onchange="handleFileUpload(this)">
                </label>
            </div>

            <button onclick="saveData()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg">ENREGISTRER</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // CONFIGURATION À REMPLIR

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCX874n5QeVk78YRkdhmN1ghv-r3ipIspE",
  authDomain: "mon-bureau-numerique.firebaseapp.com",
  projectId: "mon-bureau-numerique",
  storageBucket: "mon-bureau-numerique.firebasestorage.app",
  messagingSenderId: "1093006574917",
  appId: "1:1093006574917:web:d4ea80cf3edba320602a2c",
  measurementId: "G-B9LZDGTKNN"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Variables globales
        let currentTiroir = "";

        const tiroirs = [
            { id: 'paie', name: 'Fiches de Paie', color: 'bg-blue-500', icon: 'fa-id-card' },
            { id: 'factures', name: 'Factures', color: 'bg-orange-500', icon: 'fa-file-invoice-dollar' },
            { id: 'impots', name: 'Impôts', color: 'bg-red-500', icon: 'fa-landmark' },
            { id: 'urssaf', name: 'URSSAF', color: 'bg-purple-500', icon: 'fa-building-columns' },
            { id: 'tva', name: 'TVA', color: 'bg-green-500', icon: 'fa-percentage' },
            { id: 'notes', name: 'Bloc-Notes', color: 'bg-yellow-500', icon: 'fa-pen-to-square' },
            { id: 'calendar', name: 'Calendrier', color: 'bg-indigo-600', icon: 'fa-calendar-days' }
        ];

        // Rendu des tiroirs
        const grid = document.getElementById('drawerGrid');
        tiroirs.forEach(t => {
            const btn = document.createElement('button');
            btn.className = `${t.color} text-white p-6 rounded-2xl shadow-xl flex flex-col items-center justify-center space-y-3 active:scale-95 transition-transform`;
            btn.innerHTML = `<i class="fas ${t.icon} text-3xl"></i><span class="font-bold">${t.name}</span>`;
            btn.onclick = () => openDrawer(t.id, t.name);
            grid.appendChild(btn);
        });

        // Fonctions d'interface
        window.openDrawer = (id, name) => {
            currentTiroir = id;
            document.getElementById('drawerTitle').innerText = name;
            document.getElementById('drawerInterface').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('drawerInterface').classList.replace('drawer-closed', 'drawer-open');
                document.getElementById('overlay').classList.remove('hidden');
            }, 10);
            
            document.getElementById('calendarSection').classList.toggle('hidden', id !== 'calendar');
        };

        window.closeDrawer = () => {
            document.getElementById('drawerInterface').classList.replace('drawer-open', 'drawer-closed');
            document.getElementById('overlay').classList.add('hidden');
            setTimeout(() => document.getElementById('drawerInterface').classList.add('hidden'), 300);
            document.getElementById('noteArea').value = "";
        };

        // Mode Sombre Auto (19h - 07h)
        const updateTheme = () => {
            const hour = new Date().getHours();
            if (hour >= 19 || hour < 7) {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
        };
        setInterval(updateTheme, 60000);
        updateTheme();

        // Dictée Vocale (Web Speech API)
        window.startDictation = () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Micro non supporté sur ce navigateur.");
            
            const recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            recognition.start();
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('noteArea').value += " " + transcript;
            };
        };

        // Sauvegarde Firebase
        window.saveData = async () => {
            const note = document.getElementById('noteArea').value;
            const dateRef = currentTiroir === 'calendar' ? document.getElementById('calDate').value : new Date().toISOString().split('T')[0];
            
            try {
                await setDoc(doc(db, currentTiroir, `doc_${dateRef}`), {
                    note: note,
                    timestamp: new Date()
                });
                alert("Enregistré avec succès !");
                closeDrawer();
            } catch (e) {
                console.error("Erreur Firebase:", e);
                alert("Erreur lors de l'enregistrement. Vérifiez votre config Firebase.");
            }
        };

        // Horloge
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        }, 1000);
    </script>
</body>
</html>
