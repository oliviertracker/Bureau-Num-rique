<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
   <title>Mon Bureau Numérique</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen p-4 font-sans text-black">

   <header class="flex justify-between items-center mb-6">
       <h1 class="text-2xl font-bold italic">Mon Bureau</h1>
       <div id="clock" class="text-lg font-mono font-bold text-blue-700">--:--</div>
   </header>

   <main class="grid grid-cols-2 gap-4" id="drawerGrid"></main>

   <div id="overlay" class="fixed inset-0 bg-black/60 hidden z-40" onclick="closeDrawer()"></div>

   <div id="drawerInterface" class="fixed bottom-0 left-0 right-0 h-[92vh] bg-gray-50 rounded-t-3xl shadow-2xl z-50 p-6 hidden overflow-y-auto">
       <div class="flex justify-between items-center mb-4">
           <h2 id="drawerTitle" class="text-xl font-bold uppercase text-indigo-900 text-sm">Tiroir</h2>
           <button onclick="closeDrawer()" class="text-4xl text-red-500 font-bold">&times;</button>
       </div>

       <div class="space-y-4">
           <div id="paieSection" class="hidden"><input type="text" id="employeeName" class="w-full p-3 rounded-xl border-2 border-gray-300" placeholder="NOM DE L'EMPLOYÉ"></div>

           <div class="relative">
               <textarea id="noteArea" rows="3" class="w-full p-4 rounded-xl border-2 border-gray-300" placeholder="Écrire ici..."></textarea>
               <button onclick="startDictation()" class="absolute right-3 bottom-3 bg-blue-600 text-white p-3 rounded-full shadow-lg"><i class="fas fa-microphone"></i></button>
           </div>

           <div class="grid grid-cols-2 gap-4">
               <button onclick="document.getElementById('photoInput').click()" class="p-4 border-2 border-blue-500 rounded-2xl bg-white flex flex-col items-center">
                   <i class="fas fa-camera text-2xl mb-1 text-blue-600"></i><span class="text-[10px] font-bold">PHOTO</span>
                   <input type="file" id="photoInput" accept="image/*" capture="environment" class="hidden">
               </button>
               <button id="saveBtn" onclick="saveToFirebase()" class="bg-indigo-700 text-white rounded-2xl font-bold uppercase text-xs">ENREGISTRER</button>
           </div>

           <hr class="my-6">
           <div id="notesList" class="pb-24"></div>
       </div>
   </div>

   <script type="module">
       import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
       import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
       import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

       const firebaseConfig = {
           apiKey: "AIzaSyCX874n5QeVk78YRkdhmN1ghv-r3ipIspE",
           authDomain: "mon-bureau-numerique.firebaseapp.com",
           projectId: "mon-bureau-numerique",
           storageBucket: "mon-bureau-numerique.firebasestorage.app", // Vérifie bien ce nom dans ta console !
           messagingSenderId: "1093006574917",
           appId: "1:1093006574917:web:d4ea80cf3edba320602a2c"
       };

       const app = initializeApp(firebaseConfig);
       const db = getFirestore(app);
       const storage = getStorage(app);
       let currentTiroir = "";
       let unsubscribe = null;

       // Création des boutons
       const tiroirs = [
           { id: 'paie', name: 'Paie', color: 'bg-blue-500', icon: 'fa-id-card' },
           { id: 'notes', name: 'Notes', color: 'bg-yellow-500', icon: 'fa-pen' }
       ];

       const grid = document.getElementById('drawerGrid');
       tiroirs.forEach(t => {
           const btn = document.createElement('button');
           btn.className = `${t.color} text-white p-6 rounded-3xl shadow-lg flex flex-col items-center`;
           btn.innerHTML = `<i class="fas ${t.icon} text-3xl mb-2"></i><span class="font-bold text-xs uppercase">${t.name}</span>`;
           btn.onclick = () => openDrawer(t.id, t.name);
           grid.appendChild(btn);
       });

       window.openDrawer = (id, name) => {
           currentTiroir = id;
           document.getElementById('drawerTitle').innerText = name;
           document.getElementById('drawerInterface').classList.remove('hidden');
           document.getElementById('paieSection').classList.toggle('hidden', id !== 'paie');
           document.getElementById('overlay').classList.remove('hidden');
           fetchNotes();
       };

       window.closeDrawer = () => {
           document.getElementById('drawerInterface').classList.add('hidden');
           document.getElementById('overlay').classList.add('hidden');
           if(unsubscribe) unsubscribe();
       };

       window.fetchNotes = () => {
           if(unsubscribe) unsubscribe();
           const q = query(collection(db, currentTiroir), orderBy("timestamp", "desc"));
           unsubscribe = onSnapshot(q, (snapshot) => {
               const list = document.getElementById('notesList');
               list.innerHTML = "";
               snapshot.forEach((docSnap) => {
                   const data = docSnap.data();
                   const img = data.fileUrl ? `<img src="${data.fileUrl}" class="w-full rounded-lg mt-2 border">` : "";
                   list.innerHTML += `<div class="bg-white p-3 rounded-lg shadow mb-3 border-l-4 border-indigo-500">
                       <p class="text-[10px] text-gray-400 font-bold">${data.timestamp?.toDate().toLocaleString()}</p>
                       <p class="font-bold text-indigo-900">${data.employee || ''}</p>
                       <p class="text-sm">${data.note || ''}</p>
                       ${img}
                       <button onclick="deleteNote('${docSnap.id}')" class="text-red-500 text-[10px] mt-2 font-bold">EFFACER</button>
                   </div>`;
               });
           });
       };

       window.saveToFirebase = async () => {
           const btn = document.getElementById('saveBtn');
           const noteInput = document.getElementById('noteArea');
           const file = document.getElementById('photoInput').files[0];

           btn.innerText = "ENVOI..."; btn.disabled = true;
           let url = "";

           try {
               if(file) {
                   const sRef = ref(storage, `bureau/${Date.now()}_${file.name}`);
                   await uploadBytes(sRef, file);
                   url = await getDownloadURL(sRef);
               }

               await addDoc(collection(db, currentTiroir), {
                   note: noteInput.value,
                   employee: document.getElementById('employeeName')?.value || "",
                   fileUrl: url,
                   timestamp: new Date()
               });
               noteInput.value = "";
               alert("✅ Enregistré !");
           } catch (e) { alert("Erreur : " + e.message); }
           btn.innerText = "ENREGISTRER"; btn.disabled = false;
       };

       window.deleteNote = async (id) => { if(confirm("Supprimer ?")) await deleteDoc(doc(db, currentTiroir, id)); };

       window.startDictation = () => {
           const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
           rec.lang = 'fr-FR';
           rec.onresult = (e) => { document.getElementById('noteArea').value += " " + e.results[0][0].transcript; };
           rec.start();
       };

       setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
   </script>
</body>
</html>
