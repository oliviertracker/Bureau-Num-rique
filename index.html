<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
   <title>Mon Bureau Numérique</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <style>
       .drawer-open { transform: translateY(0%); transition: transform 0.4s ease-out; }
       .drawer-closed { transform: translateY(100%); transition: transform 0.3s ease-in; }
       body { transition: background-color 0.5s, color 0.5s; }
       .dark-mode { background-color: #1a1a1a; color: #f9fafb; }
       .wood-texture { background-color: #f3f4f6; }
   </style>
</head>
<body class="wood-texture min-h-screen p-4 font-sans">

   <header class="flex justify-between items-center mb-8">
       <h1 class="text-2xl font-bold">Mon Bureau</h1>
       <div id="clock" class="text-lg font-mono">--:--</div>
   </header>

   <main class="grid grid-cols-2 gap-4" id="drawerGrid"></main>

   <div id="overlay" class="fixed inset-0 bg-black/50 hidden z-40" onclick="closeDrawer()"></div>
   <div id="drawerInterface" class="fixed bottom-0 left-0 right-0 h-[92vh] bg-white dark:bg-gray-800 rounded-t-3xl shadow-2xl z-50 drawer-closed p-6 hidden">
       <div class="flex justify-between items-center mb-6">
           <h2 id="drawerTitle" class="text-2xl font-bold">Tiroir</h2>
           <button onclick="closeDrawer()" class="text-3xl font-bold">&times;</button>
       </div>

       <div class="space-y-6">
           <div id="calendarSection" class="hidden">
               <input type="date" id="calDate" class="w-full p-4 border rounded-xl dark:bg-gray-700 mb-2">
               <p class="text-sm opacity-70">Sélectionnez une date pour vos rendez-vous.</p>
           </div>

           <div class="relative">
               <label class="block mb-2 font-semibold italic">Ajouter une note :</label>
               <textarea id="noteArea" rows="5" class="w-full p-4 border rounded-xl dark:bg-gray-700 focus:ring-2 focus:ring-blue-500" placeholder="Tapez ou dictez..."></textarea>
               <button onclick="startDictation()" class="absolute right-3 bottom-3 bg-blue-600 text-white p-4 rounded-full shadow-lg active:scale-90">
                   <i class="fas fa-microphone"></i>
               </button>
           </div>

           <div class="grid grid-cols-2 gap-4">
               <label class="flex flex-col items-center justify-center p-6 border-2 border-dashed border-gray-400 rounded-2xl cursor-pointer active:bg-gray-100 dark:active:bg-gray-700">
                   <i class="fas fa-camera text-3xl mb-2 text-blue-500"></i>
                   <span class="text-xs font-bold uppercase">Photo</span>
                   <input type="file" accept="image/*" capture="environment" class="hidden">
               </label>
               <label class="flex flex-col items-center justify-center p-6 border-2 border-dashed border-gray-400 rounded-2xl cursor-pointer active:bg-gray-100 dark:active:bg-gray-700">
                   <i class="fas fa-paperclip text-3xl mb-2 text-green-500"></i>
                   <span class="text-xs font-bold uppercase">Fichier</span>
                   <input type="file" class="hidden">
               </label>
           </div>

           <button onclick="saveData()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-lg shadow-xl active:bg-indigo-700">
               <i class="fas fa-cloud-arrow-up mr-2"></i> ENREGISTRER DANS LE BUREAU
           </button>
       </div>
   </div>

   <script type="module">
       import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
       import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

       // CONFIGURATION CORRIGÉE
       const firebaseConfig = {
           apiKey: "AIzaSyCX874n5QeVk78YRkdhmN1ghv-r3ipIspE",
           authDomain: "mon-bureau-numerique.firebaseapp.com",
           projectId: "mon-bureau-numerique",
           storageBucket: "mon-bureau-numerique.firebasestorage.app",
           messagingSenderId: "1093006574917",
           appId: "1:1093006574917:web:d4ea80cf3edba320602a2c",
           measurementId: "G-B9LZDGTKNN"
       };

       const app = initializeApp(firebaseConfig);
       const db = getFirestore(app);

       let currentTiroir = "";
       const tiroirs = [
           { id: 'paie', name: 'Paie', color: 'bg-blue-500', icon: 'fa-id-card' },
           { id: 'factures', name: 'Factures', color: 'bg-orange-500', icon: 'fa-file-invoice-dollar' },
           { id: 'impots', name: 'Impôts', color: 'bg-red-500', icon: 'fa-landmark' },
           { id: 'urssaf', name: 'URSSAF', color: 'bg-purple-500', icon: 'fa-building-columns' },
           { id: 'tva', name: 'TVA', color: 'bg-green-600', icon: 'fa-percentage' },
           { id: 'notes', name: 'Bloc-notes', color: 'bg-yellow-500', icon: 'fa-pen-to-square' },
           { id: 'calendar', name: 'Calendrier', color: 'bg-indigo-600', icon: 'fa-calendar-days' }
       ];

       // Création de la grille
       const grid = document.getElementById('drawerGrid');
       tiroirs.forEach(t => {
           const btn = document.createElement('button');
           btn.className = `${t.color} text-white p-6 rounded-3xl shadow-lg flex flex-col items-center justify-center space-y-3 active:scale-95 transition-all`;
           btn.innerHTML = `<i class="fas ${t.icon} text-3xl"></i><span class="font-bold text-sm uppercase">${t.name}</span>`;
           btn.onclick = () => openDrawer(t.id, t.name);
           grid.appendChild(btn);
       });

       window.openDrawer = (id, name) => {
           currentTiroir = id;
           document.getElementById('drawerTitle').innerText = name;
           document.getElementById('drawerInterface').classList.remove('hidden');
           setTimeout(() => {
               document.getElementById('drawerInterface').classList.replace('drawer-closed', 'drawer-open');
               document.getElementById('overlay').classList.remove('hidden');
           }, 10);
           document.getElementById('calendarSection').classList.toggle('hidden', id !== 'calendar');
       };

       window.closeDrawer = () => {
           document.getElementById('drawerInterface').classList.replace('drawer-open', 'drawer-closed');
           document.getElementById('overlay').classList.add('hidden');
           setTimeout(() => document.getElementById('drawerInterface').classList.add('hidden'), 300);
           document.getElementById('noteArea').value = "";
       };

       // Dictée Vocale
       window.startDictation = () => {
           const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
           if (!SpeechRecognition) return alert("Micro non supporté sur ce navigateur.");
           const recognition = new SpeechRecognition();
           recognition.lang = 'fr-FR';
           recognition.start();
           recognition.onresult = (e) => {
               document.getElementById('noteArea').value += " " + e.results[0][0].transcript;
           };
       };

       // Sauvegarde Firebase
       window.saveData = async () => {
           const note = document.getElementById('noteArea').value;
           if(!note) return alert("Le tiroir est vide, écris ou dicte quelque chose !");

           const dateID = currentTiroir === 'calendar' ? document.getElementById('calDate').value : new Date().toISOString().split('T')[0];

           try {
               await setDoc(doc(db, currentTiroir, `doc_${dateID || 'auj'}`), {
                   note: note,
                   date: dateID,
                   timestamp: new Date()
               });
               alert("Rangé avec succès dans le tiroir " + currentTiroir + " !");
               closeDrawer();
           } catch (e) {
               alert("Erreur : Vérifie que tu as bien activé 'Firestore' en mode TEST dans ta console Firebase.");
           }
       };

       // Mode Sombre Automatique
       const updateTheme = () => {
           const hour = new Date().getHours();
           if (hour >= 19 || hour < 7) document.body.classList.add('dark-mode');
           else document.body.classList.remove('dark-mode');
       };
       updateTheme();

       // Horloge
       setInterval(() => {
           document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
       }, 1000);
   </script>
</body>
</html>
